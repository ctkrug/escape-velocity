<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apogee — orbital mechanics simulator you play in one drag</title>
  <meta
    name="description"
    content="Apogee is a gravity simulator browser game: drag to launch a satellite off a tiny planet and watch real two-body physics resolve to a crash, orbit, or escape."
  />
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a1628'/%3E%3Cellipse cx='16' cy='16' rx='13' ry='6' fill='none' stroke='%23ff6b4a' stroke-width='2' transform='rotate(-20 16 16)'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%234dd8e8'/%3E%3C/svg%3E"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header class="masthead">
    <h1 class="wordmark">
      AP<span class="wordmark-orbit-wrap"><span class="wordmark-planet">O</span><span class="wordmark-orbit-dot" aria-hidden="true"></span></span>GEE
    </h1>
    <p class="tagline">drag a satellite off a tiny planet: crash, orbit, or escape</p>
  </header>
  <main class="stage">
    <div class="stage-canvas-wrap" id="canvas-wrap">
      <canvas id="scene" aria-label="Orbital simulation canvas"></canvas>
      <div class="outcome-overlay" id="outcome-overlay" hidden>
        <div class="outcome-card">
          <p class="outcome-title" id="outcome-title">CRASH</p>
          <dl class="outcome-stats" id="outcome-stats"></dl>
          <button type="button" class="btn btn-primary" id="launch-another">Launch Another</button>
        </div>
      </div>
    </div>

    <div class="hud-panel">
      <dl class="hud-grid" id="hud-grid">
        <div class="hud-item"><dt>velocity</dt><dd id="hud-velocity">—</dd></div>
        <div class="hud-item"><dt>altitude</dt><dd id="hud-altitude">—</dd></div>
        <div class="hud-item"><dt>apoapsis</dt><dd id="hud-apoapsis">—</dd></div>
        <div class="hud-item"><dt>periapsis</dt><dd id="hud-periapsis">—</dd></div>
        <div class="hud-item"><dt>period</dt><dd id="hud-period">—</dd></div>
        <div class="hud-item"><dt>orbits locked</dt><dd id="hud-orbit-count">0</dd></div>
      </dl>
      <p id="hud-status" class="hud-status" role="status" aria-live="polite"></p>
    </div>

    <div class="controls">
      <label class="control gravity-control" for="gravity-slider">
        <span class="control-label">gravity&nbsp;(GM)</span>
        <input type="range" id="gravity-slider" min="1500" max="7000" step="100" value="4000" />
        <span class="control-value" id="gravity-value">4000</span>
      </label>
      <div class="control-buttons">
        <button type="button" class="btn btn-icon" id="mute-toggle" aria-label="Mute sound" aria-pressed="false"></button>
        <button type="button" class="btn" id="reset-button">Reset</button>
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <p>real two-body gravity, simulated in your browser · no install, no accounts</p>
  </footer>
  <script type="module" src="src/main.js"></script>
</body>
</html>
